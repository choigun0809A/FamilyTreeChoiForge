<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Nexus | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-color: #0f172a; /* Deep Slate 950 */
      color: #f1f5f9;
    }
    .request-card {
      background: #1e293b; /* Slate 800 */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #334155;
    }
    .request-card:hover {
      transform: translateY(-4px);
      border-color: #6366f1;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .status-badge {
      backdrop-filter: blur(4px);
    }
    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="min-h-screen font-sans">

  <div class="max-w-6xl mx-auto p-4 lg:p-10">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
      <div>
        <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
          Nexus Control
        </h1>
        <p class="text-slate-400 mt-1 font-medium">System Verification Queue</p>
      </div>
      
      <button onclick="loadRequests()" 
              class="group bg-slate-800 hover:bg-indigo-600 border border-slate-700 hover:border-indigo-400 text-white px-6 py-3 rounded-2xl flex items-center gap-3 transition-all active:scale-95 shadow-lg">
        <i class="fas fa-sync-alt group-active:rotate-180 transition-transform"></i> 
        <span class="font-bold">Refresh Data</span>
      </button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
            <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Operational Mode</p>
            <p class="text-emerald-400 font-mono">ENCRYPTED</p>
        </div>
    </div>

    <div id="requestsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="text-slate-500 animate-pulse">Initializing terminal...</div>
    </div>
  </div>

  <script>
    let allRequests = {};

    async function loadRequests() {
      const container = document.getElementById('requestsContainer');
      try {
        const res = await fetch('/get_all_requests');
        allRequests = await res.json();
        renderRequests();
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="col-span-full p-8 bg-red-900/20 border border-red-500/50 rounded-2xl text-red-400 text-center">
            <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i><br>Connection Interrupted: Failed to reach Nexus.</div>`;
      }
    }

    function renderRequests() {
      const container = document.getElementById('requestsContainer');
      container.innerHTML = '';

      const uids = Object.keys(allRequests);
      
      if (uids.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center p-20 text-slate-600 font-medium">No pending requests in the buffer.</div>`;
        return;
      }

      uids.forEach(uid => {
        const req = allRequests[uid];
        const isVerified = req.verified;

        const card = document.createElement('div');
        card.className = `request-card rounded-3xl p-6 flex flex-col justify-between`;

        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 bg-slate-900 rounded-2xl border border-slate-700">
                <i class="fas ${isVerified ? 'fa-user-shield text-emerald-400' : 'fa-user-clock text-amber-400'} text-xl"></i>
              </div>
              <span class="status-badge px-3 py-1 text-xs font-black uppercase tracking-widest rounded-lg 
                ${isVerified ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}">
                ${isVerified ? 'Authorized' : 'Pending'}
              </span>
            </div>

            <div class="space-y-1">
              <h3 class="text-xl font-bold text-white truncate">${req.email}</h3>
              <p class="text-xs font-mono text-slate-500 tracking-tighter">UID: ${uid}</p>
            </div>

            <div class="mt-6 p-4 bg-slate-900/50 rounded-2xl border border-slate-700/30 space-y-3">
              <div class="flex justify-between items-center">
                <span class="text-xs text-slate-500 font-bold uppercase">Security Token</span>
                <span class="font-mono text-sm text-indigo-300">${req.password || '••••••••'}</span>
              </div>
            </div>
          </div>

          <div class="mt-8">
            <button onclick="toggleVerification('${uid}')" 
                    class="w-full py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-[0.98] shadow-lg
                    ${isVerified 
                      ? 'bg-slate-700 hover:bg-red-600/20 text-red-400 border border-red-500/30 hover:border-red-500/50' 
                      : 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-indigo-500/20'}">
              ${isVerified ? 'Revoke Access' : 'Authenticate Identity'}
            </button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    async function toggleVerification(uid) {
      const requestData = allRequests[uid];
      if (!requestData) return;

      requestData.verified = !requestData.verified;

      try {
        const res = await fetch('/update_request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: uid, data: requestData })
        });

        const result = await res.json();
        if (result.success) {
          loadRequests(); 
        } else {
          alert("Unauthorized Action: " + (result.message || 'Unknown Error'));
        }
      } catch (err) {
        alert("Transmission Failed: Check your uplink.");
      }
    }

    window.onload = loadRequests;
  </script>
</body>
</html>
