<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus | Terminal Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap");

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cyber-input {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-input:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-gradient:hover {
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            filter: brightness(1.1);
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }

        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    </style>
</head>
<body>
    <div class="admin-window glass-panel w-full max-w-[400px] rounded-[2rem] overflow-hidden shimmer">
        <div class="pt-10 pb-6 px-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl mb-6">
                <i class="fas fa-shield-halved text-2xl text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Nexus Control</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Authentication Required</p>
        </div>

        <div class="px-8 pb-10">
            <form id="adminLoginForm" class="space-y-6">
                <div class="space-y-2">
                    <label for="password" class="text-xs font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Secure Key</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••••••"
                            required
                            class="cyber-input w-full px-5 py-4 rounded-2xl text-white font-mono placeholder:text-slate-600 outline-none"
                            autocomplete="current-password"
                        />
                        <button type="button" id="toggleBtn" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-indigo-400 transition-colors px-2">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-gradient w-full py-4 rounded-2xl text-white font-bold tracking-wide transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span>Initialize Uplink</span>
                    <i class="fas fa-arrow-right text-xs opacity-50 group-hover:translate-x-1 transition-transform"></i>
                </button>

                <div id="errorMessage" class="hidden text-center text-red-400 text-sm font-medium animate-bounce mt-4">
                    <i class="fas fa-circle-exclamation mr-1"></i> Access Denied
                </div>
            </form>
        </div>

        <div class="bg-slate-900/40 py-6 px-8 border-t border-white/5 text-center">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">
                Secure Terminal &bull; <span class="text-indigo-500/50">v2.4.0</span>
            </p>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById("toggleBtn");
        const passwordInput = document.getElementById("password");
        const eyeIcon = toggleBtn.querySelector("i");

        // Polished Toggle
        toggleBtn.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            eyeIcon.className = isPassword ? "far fa-eye-slash" : "far fa-eye";
        });

        const form = document.getElementById("adminLoginForm");
        const errorMessage = document.getElementById("errorMessage");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            errorMessage.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Authenticating...`;

            const password = passwordInput.value.trim();

            try {
                const response = await fetch("/adminCheck", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password }),
                });
                
                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect || "/dashboard";
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span>Initialize Uplink</span><i class="fas fa-arrow-right text-xs opacity-50"></i>`;
                    errorMessage.classList.remove("hidden");
                    errorMessage.textContent = data.message || "Invalid Security Key";
                }
            } catch (err) {
                console.error(err);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Retry Connection</span>`;
                errorMessage.classList.remove("hidden");
                errorMessage.textContent = "Network Error: Uplink Failed";
            }
        });
    </script>
</body>
</html>
