<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap");

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid #334155 !important;
            color: white !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: #818cf8 !important;
            background: rgba(15, 23, 42, 0.9) !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .nexus-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .nexus-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.4);
        }

        .custom-checkbox {
            accent-color: #6366f1;
        }
    </style>
</head>
<body class="p-4 overflow-x-hidden">
    <div class="max-w-sm md:max-w-md w-full">
        <div class="text-center mb-8 md:mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 rounded-3xl bg-indigo-500/10 border border-indigo-500/20 mb-4 md:mb-6 transition-transform hover:rotate-12">
                <i class="fas fa-bolt-lightning text-xl md:text-2xl text-indigo-400"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Сайн байна уу</h1>
            <p class="text-slate-400 mt-2 font-medium text-sm md:text-base">Нэвтрэх хуудас</p>
        </div>

        <div class="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 relative overflow-hidden">
            <form id="loginForm" class="space-y-5 md:space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-500 ml-1" for="email">
                        Gmail
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600">
                            <i class="fas fa-envelope text-sm md:text-base"></i>
                        </span>
                        <input 
                            type="email" 
                            id="email"
                            required
                            placeholder="you@example.com"
                            class="input-field w-full pl-11 pr-4 py-3 md:py-4 rounded-xl md:rounded-2xl outline-none placeholder:text-slate-600 text-sm md:text-base"
                        >
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-end px-1">
                        <label class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-500" for="password">
                            Нууц үг
                        </label>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600">
                            <i class="fas fa-lock text-sm md:text-base"></i>
                        </span>
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="••••••••"
                            class="input-field w-full pl-11 pr-4 py-3 md:py-4 rounded-xl md:rounded-2xl outline-none font-mono text-sm md:text-base"
                        >
                    </div>
                </div>

                <button 
                    type="submit"
                    id="submitBtn"
                    class="nexus-btn w-full text-white font-bold py-3 md:py-4 rounded-xl md:rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] mt-2"
                >
                    <span id="btnText" class="text-sm md:text-base">Нэвтрэх</span>
                    <i id="btnIcon" class="fas fa-sign-in-alt opacity-50 text-sm md:text-base"></i>
                    <span id="loadingSpinner" class="hidden animate-spin h-4 w-4 md:h-5 md:w-5 border-2 border-white/30 border-t-white rounded-full"></span>
                </button>
            </form>

            <div class="mt-6 md:mt-8 text-center">
                <p class="text-xs md:text-sm text-slate-500 flex flex-col md:inline-block items-center gap-1 md:gap-0">
                    <span>Signup</span>
                    <a href="/signup" class="text-indigo-400 hover:text-indigo-300 font-bold md:ml-1 transition-colors">Шинээр бүртгүүлэх</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-8 md:mt-10 space-y-3 px-2">
            <p class="text-[9px] md:text-[10px] text-slate-600 font-black uppercase tracking-widest md:tracking-[0.4em]">
                Secure Core System &bull; 2026 CHOIFORGE
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const loadingSpinner = document.getElementById('loadingSpinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Loading State
            btnText.textContent = "Verifying...";
            btnIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    alert('Access Denied: ' + (data.message || 'Check credentials'));
                }
            } catch (error) {
                alert('Terminal Error: Connection to host lost');
            } finally {
                btnText.textContent = "Initiate Session";
                btnIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
