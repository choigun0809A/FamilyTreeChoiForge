<!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Family Heritage | Nexus</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
          rel="stylesheet"
        />
        <style>
          body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
          }

          /* Better Scrollbar Styling */
          .custom-scroll::-webkit-scrollbar {
            height: 5px;
            width: 5px;
          }
          .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
          }
          .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
          }
          .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
          }

          /* Container Polish */
          .row-container {
            display: flex;
            gap: 2rem;
            padding: 1.5rem; /* Increased padding to prevent card clipping when scaling */
            justify-content: start; /* Better for scrolling lists */
            align-items: center;
            min-height: 200px;
            scroll-behavior: smooth;
          }

          /* If few items, center them; if many, allow scroll from start */
          .row-container:not(:has(> :nth-child(3))) {
            justify-content: center;
          }

          /* Modern Card Styling */
          .tree-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.8);
            background: white;
            min-width: 160px;
            flex-shrink: 0;
          }

          .tree-card.active {
            border-color: #6366f1;
            background-color: #ffffff;
            transform: scale(1.1) translateY(-5px);
            box-shadow:
              0 20px 25px -5px rgba(99, 102, 241, 0.1),
              0 8px 10px -6px rgba(99, 102, 241, 0.1);
            z-index: 20;
          }

          .tree-card:hover:not(.active) {
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
          }

          /* Generation Connectors */
          .generation-gap {
            position: relative;
            height: 30px;
            width: 2px;
            background: linear-gradient(to bottom, #cbd5e1, #e2e8f0);
            margin: 0 auto;
          }

          .generation-gap::before,
          .generation-gap::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e1;
            left: 50%;
            transform: translateX(-50%);
          }
          .generation-gap::before {
            top: -6px;
          }
          .generation-gap::after {
            bottom: -6px;
          }

          /* Sidebar highlight */
          .member-item-active {
            background: linear-gradient(90deg, #f8fafc 0%, #eef2ff 100%);
            border-left: 4px solid #6366f1 !important;
          }

          @keyframes shake {
            0%,
            100% {
              transform: rotate(0deg);
            }
            25% {
              transform: rotate(-10deg);
            }
            75% {
              transform: rotate(10deg);
            }
          }

          .group:hover .group-hover\:shake {
            animation: shake 0.3s ease-in-out infinite;
          }

          #deleteMemberModal {
            animation: fadeIn 0.2s ease-out;
          }

          @keyframes fadeIn {
            from {
              opacity: 0;
              transform: scale(0.95);
            }
            to {
              opacity: 1;
              transform: scale(1);
            }
          }
        </style>
      </head>
      <body class="p-4 lg:p-6">
        <div
          id="sidebarBackdrop"
          onclick="toggleSidebar()"
          class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-40 hidden lg:hidden"
        ></div>

        {% block header %} {% endblock%}

        <main
          class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6"
        >
          {% block sidebar %} {% endblock %}

          {% block content %} {% endblock %}

          {% block details %} {% endblock %}
        </main>

        {% block add_member %} {% endblock %}

        <script>
          let allMembers = {};
          let currentMemberKey = null;

          // --- Modal Controls ---
          const deleteModal = document.getElementById("deleteMemberModal");

          document
            .getElementById("deleteMemberBtn")
            .addEventListener("click", () => {
              deleteModal.classList.remove("hidden");
            });

          document
            .getElementById("cancelDeleteBtn")
            .addEventListener("click", () => {
              deleteModal.classList.add("hidden");
            });

          // Close modal if clicking outside the inner box
          deleteModal.addEventListener("click", (e) => {
            if (e.target === deleteModal) deleteModal.classList.add("hidden");
          });

          // --- Delete Logic ---
          async function deleteMember() {
            if (!currentMemberKey) return;

            // UI Loading State
            const confirmBtn = document.getElementById("confirmDeleteBtn");
            const originalText = confirmBtn.innerText;
            confirmBtn.innerText = "Purging...";
            confirmBtn.disabled = true;

            try {
              const response = await fetch("/delete_member", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key: currentMemberKey }),
              });

              if (response.ok) {
                deleteModal.classList.add("hidden");

                // Re-sync local data
                await loadMembers();

                const keys = Object.keys(allMembers);
                if (keys.length > 0) {
                  // Select the first available member in the list
                  selectMember(keys[0]);
                } else {
                  // If no members left, reset UI
                  currentMemberKey = null;
                  document
                    .getElementById("detailsPanel")
                    .classList.add("hidden");
                  document
                    .getElementById("noSelectionMsg")
                    .classList.remove("hidden");
                  document
                    .getElementById("noDetailsMsg")
                    .classList.remove("hidden");
                  document.getElementById("rowParents").innerHTML = "";
                  document.getElementById("rowCurrent").innerHTML = "";
                  document.getElementById("rowChildren").innerHTML = "";
                }
              } else {
                alert("System Error: Could not purge record.");
              }
            } catch (error) {
              console.error("Critical Network Failure:", error);
            } finally {
              confirmBtn.innerText = originalText;
              confirmBtn.disabled = false;
            }
            
            toggleDetails();
          }

          // Bind the button
          document
            .getElementById("confirmDeleteBtn")
            .addEventListener("click", deleteMember);

          async function loadMembers() {
            try {
              const res = await fetch("/get_all_members");
              allMembers = await res.json();
              renderSidebar();
              if (currentMemberKey) refreshVisualizer();
            } catch (e) {
              console.error("Error loading members", e);
            }
          }

          function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const backdrop = document.getElementById("sidebarBackdrop");

            if (sidebar.classList.contains("-translate-x-full")) {
              sidebar.classList.remove("-translate-x-full");
              backdrop.classList.remove("hidden");
            } else {
              sidebar.classList.add("-translate-x-full");
              backdrop.classList.add("hidden");
            }
          }

          function toggleDetails() {
            const wrapper = document.getElementById("detailsWrapper");

            if (wrapper.classList.contains("opacity-0")) {
              wrapper.classList.remove("opacity-0", "pointer-events-none");
              wrapper.classList.add("opacity-100", "pointer-events-auto");
            } else {
              wrapper.classList.add("opacity-0", "pointer-events-none");
              wrapper.classList.remove("opacity-100", "pointer-events-auto");
            }
          }

          let currentSearchTerm = "";

function renderSidebar(filteredMembers = null) {
  const container = document.getElementById("membersList");
  container.innerHTML = "";

  const membersToRender = filteredMembers || Object.entries(allMembers).sort((a, b) =>
    a[1].name.localeCompare(b[1].name)
  );

  if (membersToRender.length === 0) {
    container.innerHTML = `
      <div class="text-center py-12 text-slate-400">
        <p class="text-2xl mb-2">😕</p>
        <p class="text-sm">No members found</p>
      </div>
    `;
    return;
  }

  membersToRender.forEach(([key, member]) => {
    const emoji = member.gender === "Female" ? "👩" : "👨";

    const div = document.createElement("div");
    div.className = `p-4 rounded-2xl border cursor-pointer transition-all flex items-center gap-4 group ${currentMemberKey === key 
      ? "bg-indigo-50 border-indigo-200 ring-2 ring-indigo-500" 
      : "bg-white border-slate-100 hover:border-indigo-200"}`;

    div.innerHTML = `
      <div class="text-3xl flex-shrink-0">${emoji}</div>
      
      <div class="flex-1 overflow-hidden">
        <div class="font-bold text-lg truncate">${member.name}</div>
        <div class="text-slate-400 text-xs font-mono">ID: ${member.uniqueId}</div>
      </div>

      <!-- Copy Button -->
      <button onclick="event.stopImmediatePropagation(); copyMemberInfo('${member.name}', '${member.uniqueId}', this)" 
              class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold w-7 h-7 rounded-xl flex items-center justify-center shadow-sm transition-all flex-shrink-0"
              title="Copy Name and ID">
        📋
      </button>
    `;

    div.onclick = () => selectMember(key);
    container.appendChild(div);
  });
}

// New function: Filter members based on search input
function filterMembers() {
  const searchInput = document.getElementById("memberSearch");
  currentSearchTerm = searchInput.value.toLowerCase().trim();

  if (!currentSearchTerm) {
    renderSidebar();                    // Show all if search is empty
    return;
  }

  const filtered = Object.entries(allMembers).filter(([key, member]) => {
    return (
      member.name.toLowerCase().includes(currentSearchTerm) ||
      String(member.uniqueId).includes(currentSearchTerm)
    );
  }).sort((a, b) => a[1].name.localeCompare(b[1].name));

  renderSidebar(filtered);
}

          function selectMember(key) {
            currentMemberKey = key;
            const member = allMembers[key];

            document.getElementById("noSelectionMsg").classList.add("hidden");
            document.getElementById("noDetailsMsg").classList.add("hidden");
            document.getElementById("detailsPanel").classList.remove("hidden");

            // Show Mobile "Edit Info" Button
            document.getElementById("mobileEditBtn").classList.remove("hidden");
            document
              .getElementById("mobileEditBtn")
              .classList.add("inline-block");

            document.getElementById("editName").value = member.name;
            document.getElementById("editGender").value = member.gender;
            document.getElementById("editBirthDate").value =
              member.birthDate || "";

            renderSidebar();
            refreshVisualizer();

            // Auto-close sidebar on mobile after selecting a member
            if (window.innerWidth < 1024) {
              const sidebar = document.getElementById("sidebar");
              if (!sidebar.classList.contains("-translate-x-full")) {
                toggleSidebar();
              }
            }
          }

          function refreshVisualizer() {
            if (!currentMemberKey) return;
            const target = allMembers[currentMemberKey];

            // 1. Parents Row
            const parentsRow = document.getElementById("rowParents");
            parentsRow.innerHTML = "";
            (target.parents || []).forEach((pStr) => {
              const [name, id] = pStr.split(" ^ ");
              const tabbedName = name[0].toUpperCase() + name.slice(1);
              parentsRow.appendChild(
                createMemberCard(tabbedName, id, false, "", true, null),
              ); // showRemove = true
            });

            // 2. Current Generation (Target + Partners/Siblings) - NO remove button
            const currentGenRow = document.getElementById("rowCurrent");
            currentGenRow.innerHTML = "";

            // Add Target
            currentGenRow.appendChild(
              createMemberCard(target.name, target.uniqueId, true),
            );

            // Add siblings (from parents' children)
            const parents = target.parents;
            const added_children = [target.name];
            parents.forEach((p) => {
              const children = allMembers[p].children || [];
              // console.log(allMembers[p], p)
              children.forEach((c) => {
                const semi_target = allMembers[c];
                const name = semi_target.name;

                const id = semi_target.uniqueId;
                // console.log(name, id, !added_children.includes(name))
                if (!added_children.includes(name)) {
                  currentGenRow.appendChild(
                    createMemberCard(
                      name,
                      id,
                      false,
                      "border-pink-200 bg-pink-50",
                    ),
                  );
                  added_children.push(name);
                }
              });
            });

            // 3. Children Row - with Remove button
            const childrenRow = document.getElementById("rowChildren");
            childrenRow.innerHTML = "";
            Array.from(target.children || []).forEach((cStr) => {
              const [name, id] = cStr.split(" ^ ");
              const tabbedName = name[0].toUpperCase() + name.slice(1);
              childrenRow.appendChild(
                createMemberCard(tabbedName, id, false, "", true, null),
              ); // showRemove = true
            });
          }

          function createMemberCard(
            name,
            id,
            isActive = false,
            extraClasses = "",
            showRemove = false,
            onRemove = null,
          ) {
            const card = document.createElement("div");
            card.className = `tree-card min-w-[150px] p-4 rounded-2xl shadow-sm text-center bg-white border cursor-pointer relative ${isActive ? "active shadow-lg" : "border-slate-200"} ${extraClasses}`;

            card.innerHTML = `
              <div class="text-2xl mb-1">${findGenderEmoji(name, id)}</div>
              <div class="font-bold text-sm leading-tight">${name}</div>
              <div class="text-[10px] text-slate-400 mt-1">ID: ${id}</div>
              
              <div class="absolute top-2 right-2 flex gap-1">
                ${
                  showRemove
                    ? `
                <button onclick="event.stopImmediatePropagation(); removeRelationship('${name}', '${id}', this)" 
                        class="bg-red-500 hover:bg-red-600 text-white text-xs font-bold w-6 h-6 rounded-full shadow-md flex items-center justify-center">
                    ×
                </button>`
                    : ""
                }
                
                <!-- Copy Button -->
                <button onclick="event.stopImmediatePropagation(); copyMemberInfo('${name}', '${id}', this)" 
                        class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold w-6 h-6 rounded-full shadow-md flex items-center justify-center transition-colors"
                        title="Copy Name and ID">
                    📋
                </button>
              </div>
            `;

            card.onclick = () => {
              const key = `${String(name).toLowerCase()} ^ ${id}`;
              if (allMembers[key]) selectMember(key);
              else alert("Member details not found in database.");
            };

            return card;
          }
          
          function copyMemberInfo(name, id, buttonElement) {
            const textToCopy = `${name} (${id})`;   // You can change format if you want, e.g. "Name - ID"

            navigator.clipboard.writeText(textToCopy).then(() => {
              // Visual feedback
              const originalText = buttonElement.innerHTML;
              buttonElement.innerHTML = '✓';
              buttonElement.classList.add('!bg-green-500');

              setTimeout(() => {
                buttonElement.innerHTML = originalText;
                buttonElement.classList.remove('!bg-green-500');
              }, 1500);
            }).catch(err => {
              console.error('Failed to copy: ', err);
              alert('Failed to copy to clipboard');
            });
          }


          function findGenderEmoji(name, id) {
            const key = `${String(name).toLowerCase()} ^ ${id}`;
            const m = allMembers[key];
            if (!m) return "👤";
            return m.gender === "Female" ? "👩" : "👨";
          }

          // ==================== REMOVE RELATIONSHIP ====================
          async function removeRelationship(type, name, id) {
            if (!currentMemberKey) return;
            const confirmMsg =
              type === "parent"
                ? `Remove ${name} as parent?`
                : `Remove ${name} as child?`;

            if (!confirm(confirmMsg)) return;

            const member = allMembers[currentMemberKey];
            const relKey = `${String(name).toLowerCase()} ^ ${id}`;

            if (type === "parent") {
              // Remove from member's parents
              member.parents = (member.parents || []).filter(
                (p) => p !== relKey,
              );

              // Remove member from parent's children list
              if (allMembers[relKey]) {
                const parent = allMembers[relKey];
                parent.children = (parent.children || []).filter(
                  (c) =>
                    c !==
                    `${String(member.name).toLowerCase()} ^ ${member.uniqueId}`,
                );
                await fetch("/update_member", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ key: relKey, member: parent }),
                });
              }
            } else if (type === "child") {
              // Remove from member's children
              member.children = (member.children || []).filter(
                (c) => c !== relKey,
              );

              // Remove member from child's parents list
              if (allMembers[relKey]) {
                const child = allMembers[relKey];
                child.parents = (child.parents || []).filter(
                  (p) =>
                    p !==
                    `${String(member.name).toLowerCase()} ^ ${member.uniqueId}`,
                );
                await fetch("/update_member", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ key: relKey, member: child }),
                });
              }
            }

            // Update current member
            await fetch("/update_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ key: currentMemberKey, member }),
            });

            loadMembers(); // Refresh everything
          }

          // ==================== Existing Functions (cleaned up) ====================
          async function autoSave() {
            if (!currentMemberKey) return;
            const member = allMembers[currentMemberKey];
            const prev_name = member.name;
            const prev_key = currentMemberKey;
            member.name = document.getElementById("editName").value;
            member.gender = document.getElementById("editGender").value;
            member.birthDate = document.getElementById("editBirthDate").value;

            console.log(member);
            await fetch("/update_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ key: currentMemberKey, member }),
            });

            loadMembers();
            selectMember(
              String(member.name).toLowerCase() + " ^ " + member.uniqueId,
            );
          }

          async function addNewMember() {
            const name = document.getElementById("name").value.trim();
            if (name.split(" ").length != 1) return alert("Name must be one word.");
            const gender = document.getElementById("gender").value;
            const birthDate = document.getElementById("birthDate").value;

            const res = await fetch("/add_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, gender, birthDate }),
            });
            if (res.ok) {
              hideAddForm();
              loadMembers();
              toggleSidebar();
            }

            document.getElementById("name").value = "";
            document.getElementById("gender").value = "Male";
            document.getElementById("birthDate").value = "";
          }

          async function addParent() {
            const splitted = document.getElementById("newParentName").value.trim().split(' ');
            const name = splitted[0];
            const id = splitted[1].replace('(', '').replace(')', '');
            if (!name || !id) return alert("Name and ID are required");

            const parentKey = `${String(name).toLowerCase()} ^ ${id}`;
            if (!allMembers[parentKey])
              return alert("Parent not found in database.");
            const member = allMembers[currentMemberKey];

            if (!member.parents) member.parents = [];
            if (!member.parents.includes(parentKey))
              member.parents.push(parentKey);

            await fetch("/update_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ key: currentMemberKey, member }),
            });

            if (allMembers[parentKey]) {
              const parent = allMembers[parentKey];
              if (!parent.children) parent.children = [];
              const childEntry = `${String(member.name).toLowerCase()} ^ ${member.uniqueId}`;
              if (!parent.children.includes(childEntry))
                parent.children.push(childEntry);

              await fetch("/update_member", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key: parentKey, member: parent }),
              });
            }

            loadMembers();
            document.getElementById("parentForm").classList.add("hidden");
            toggleDetails();

            document.getElementById("newParentName").value = "";
            document.getElementById("newParentId") = "";
          }

          async function addChild() {
            const splitted = document.getElementById("newChildName").value.trim().split(' ');
            const name = splitted[0];
            const id = splitted[1].replace('(', '').replace(')', '');
            if (!name || !id) return alert("Name and ID are required");

            const childKey = `${String(name).toLowerCase()} ^ ${id}`;
            if (!allMembers[childKey])
              return alert("Child not found in database.");
            const member = allMembers[currentMemberKey];

            if (!member.children) member.children = [];
            if (!member.children.includes(childKey))
              member.children.push(childKey);

            await fetch("/update_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ key: currentMemberKey, member }),
            });

            if (allMembers[childKey]) {
              const child = allMembers[childKey];
              if (!child.parents) child.parents = [];
              const parentEntry = `${String(member.name).toLowerCase()} ^ ${member.uniqueId}`;
              if (!child.parents.includes(parentEntry))
                child.parents.push(parentEntry);

              await fetch("/update_member", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key: childKey, member: child }),
              });
            }

            loadMembers();
            document.getElementById("childForm").classList.add("hidden");
            toggleDetails();

            document.getElementById("newChildName").value = "";
            document.getElementById("newChildId") = "";
          }

          // Remove Parent or Child Relationship (Bidirectional)
          async function removeRelationship(name, id, buttonElement) {
            if (!confirm(`Remove ${name} from this relationship?`)) return;

            const target = allMembers[currentMemberKey];
            const relKey = `${String(name).toLowerCase()} ^ ${id}`;

            // Determine if it's a parent or child
            const isParent = (target.parents || []).some((p) => p === relKey);
            const isChild = (target.children || []).some((c) => c === relKey);

            if (!isParent && !isChild) return;

            if (isParent) {
              // Remove from target's parents
              target.parents = target.parents.filter((p) => p !== relKey);

              // Remove from parent's children list
              if (allMembers[relKey]) {
                const parent = allMembers[relKey];
                parent.children = (parent.children || []).filter(
                  (c) =>
                    c !==
                    `${String(target.name).toLowerCase()} ^ ${target.uniqueId}`,
                );
                await fetch("/update_member", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ key: relKey, member: parent }),
                });
              }
            } else if (isChild) {
              // Remove from target's children
              target.children = target.children.filter((c) => c !== relKey);

              // Remove from child's parents list
              if (allMembers[relKey]) {
                const child = allMembers[relKey];
                child.parents = (child.parents || []).filter(
                  (p) =>
                    p !==
                    `${String(target.name).toLowerCase()} ^ ${target.uniqueId}`,
                );
                await fetch("/update_member", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ key: relKey, member: child }),
                });
              }
            }

            // Update current member
            await fetch("/update_member", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ key: currentMemberKey, member: target }),
            });

            loadMembers(); // Refresh everything
          }

          function showAddForm() {
            document.getElementById("addModal").classList.remove("hidden");
          }
          function hideAddForm() {
            document.getElementById("addModal").classList.add("hidden");
          }
          
          function toggleParentForm() {
            document.getElementById("parentForm").classList.toggle("hidden");
            if (!document.getElementById('childForm').classList.contains('hidden')) {
              document.getElementById("childForm").classList.toggle("hidden");
            }
          }
          function toggleChildForm() {
            document.getElementById("childForm").classList.toggle("hidden");
            if (!document.getElementById('parentForm').classList.contains('hidden')) {
              document.getElementById("parentForm").classList.toggle("hidden");
            }
          }

          window.onload = loadMembers;
        </script>
      </body>
    </html>
  </body>
</html>
