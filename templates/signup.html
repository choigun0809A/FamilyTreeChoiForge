<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus | Create Identity</title>
    <link rel="shortcut icon" href={{ url_for('static', filename='favicon_family_tree.png') }} type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap");

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #0f172a;
            background-image: 
                linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            /* STABILITY FIX: Changed height to min-height and used dvh for mobile browsers */
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .input-field {
            background: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid #334155 !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366f1 !important;
            background: rgba(30, 41, 59, 0.8) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .nexus-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nexus-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="p-4 sm:p-6">
    <div class="max-w-[440px] w-full py-6 md:py-10 my-auto">
        
        <div class="text-center mb-6 md:mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 md:w-14 md:h-14 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-3 md:mb-4">
                <i class="fas fa-plus-circle text-xl md:text-2xl text-indigo-400"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">Шинэ хэрэглэгч болох</h1>
            <p class="text-slate-400 mt-1 md:mt-2 font-medium text-sm md:text-base">Хүсэлтээ илгээх булан</p>
        </div>

        <div class="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 transition-all">
            <form id="signupForm" class="space-y-4 md:space-y-5">
                <div class="space-y-1.5 md:space-y-2">
                    <label class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-500 ml-1" for="email">
                        Gmail
                    </label>
                    <input
                        type="email"
                        id="email"
                        required
                        placeholder="user@nexus.io"
                        class="input-field w-full px-5 py-3.5 md:py-4 rounded-2xl outline-none placeholder:text-slate-600 text-sm md:text-base"
                    />
                </div>

                <div class="space-y-1.5 md:space-y-2">
                    <label class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-500 ml-1" for="password">
                        Нууц үг
                    </label>
                    <input
                        type="password"
                        id="password"
                        required
                        minlength="8"
                        placeholder="••••••••"
                        class="input-field w-full px-5 py-3.5 md:py-4 rounded-2xl outline-none font-mono text-sm md:text-base"
                    />
                </div>

                <div class="space-y-1.5 md:space-y-2">
                    <label class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-500 ml-1" for="confirm_password">
                        Нууц үгээ давтах
                    </label>
                    <input
                        type="password"
                        id="confirm_password"
                        required
                        placeholder="••••••••"
                        class="input-field w-full px-5 py-3.5 md:py-4 rounded-2xl outline-none font-mono text-sm md:text-base"
                    />
                </div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="nexus-btn w-full text-white font-bold py-3.5 md:py-4 rounded-2xl flex items-center justify-center gap-3 mt-4 active:scale-95 transition-transform"
                >
                    <span id="btnText" class="text-sm md:text-base">Хүсэлтээ илгээх</span>
                    <span
                        id="loadingSpinner"
                        class="hidden animate-spin h-5 w-5 border-2 border-white/30 border-t-white rounded-full"
                    ></span>
                </button>
            </form>

            <div class="mt-6 md:mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-xs md:text-sm text-slate-400">
                    Нэвтрэх
                    <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1 transition-colors">Хуучин хэрэглэгчээр нэвтрэх.</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-6 md:mt-8 space-y-1">
            <p class="text-[8px] md:text-[10px] text-slate-600 font-black uppercase tracking-[0.4em]">
                Nexus Encryption Protocol v4.0
            </p>
            <p class="text-[8px] md:text-[10px] text-slate-700 font-medium">
                &copy; 2026 CHOIFORGE TERMINAL. ALL RIGHTS RESERVED.
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const loadingSpinner = document.getElementById("loadingSpinner");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if (password !== confirmPassword) {
                alert("Security Alert: Key mismatch detected.");
                return;
            }

            // Set loading UI
            btnText.textContent = "Processing...";
            loadingSpinner.classList.remove("hidden");
            submitBtn.disabled = true;

            try {
                const response = await fetch("/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (data.success) {
                    alert("Account Synced Successfully. Redirecting to Login...");
                    window.location.href = "/login";
                } else {
                    alert("Initialization Failed: " + data.message);
                }
            } catch (error) {
                alert("Terminal Error: Check Uplink Connection.");
            } finally {
                btnText.textContent = "Хүсэлтээ илгээх";
                loadingSpinner.classList.add("hidden");
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
